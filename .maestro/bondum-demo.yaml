# Bondum Full Demo Recording
#
# Records a comprehensive walkthrough of the Bondum loyalty wallet app.
# Guest mode provides fake balances, NFTs, streak, and mock transactions.
#
# Prerequisites:
# - Android device connected via ADB
# - App installed (xyz.bondum.mobile)
# - Dev server running (npx expo start)
# - No backend needed (guest mode uses mock data)
#
# Run:   maestro test .maestro/bondum-demo.yaml
# Record: maestro record .maestro/bondum-demo.yaml

appId: xyz.bondum.mobile
---

# ==========================================
# LAUNCH + WELCOME SCREEN
# ==========================================

- launchApp:
    clearState: true

- swipe:
    direction: DOWN
    duration: 100

# Dev client launcher appears after clearState — tap the server URL to connect
- extendedWaitUntil:
    visible: "localhost"
    timeout: 10000

- tapOn: "localhost"

# Wait for bundle to load and welcome screen to appear
- extendedWaitUntil:
    visible: "Continue as Guest"
    timeout: 120000

- takeScreenshot: 01-welcome

# ==========================================
# LOGIN AS GUEST
# ==========================================

- tapOn: "Continue as Guest"

- extendedWaitUntil:
    visible: "Home"
    timeout: 10000

- takeScreenshot: 02-home-dashboard

# ==========================================
# EXPLORE HOME SCREEN
# ==========================================

# Scroll down to show streak + daily challenge
- swipe:
    direction: UP
    duration: 500

- takeScreenshot: 03-home-streak-challenge

# Scroll more to show featured rewards
- swipe:
    direction: UP
    duration: 500

- takeScreenshot: 04-home-featured-rewards

# Scroll back to top
- swipe:
    direction: DOWN
    duration: 500

- swipe:
    direction: DOWN
    duration: 500

# ==========================================
# SCAN QR CODE (auto-trigger in guest mode)
# ==========================================

- tapOn: "Scan"

# Scanner loads then auto-triggers fake PaniCafe scan after 2s
- extendedWaitUntil:
    visible: "Claim"
    timeout: 10000

- takeScreenshot: 06-reward-preview

# Claim the PaniCafe box reward
- tapOn: "Claim"

# Wait for success confirmation
- extendedWaitUntil:
    visible: "Reward Claimed"
    timeout: 10000

- takeScreenshot: 07-reward-claimed

# Navigate to rewards via Done button
- tapOn: "Done"

# ==========================================
# REWARDS MARKETPLACE
# ==========================================

- extendedWaitUntil:
    visible: "Affiliated Brands"
    timeout: 5000

- takeScreenshot: 08-rewards-brands

# Open PaniCafe rewards
- tapOn: "Panicafe Rewards"

- extendedWaitUntil:
    visible: "Reward"
    timeout: 5000

- takeScreenshot: 09-panicafe-rewards

# Scroll through reward list
- swipe:
    direction: UP
    duration: 500

- takeScreenshot: 10-panicafe-scrolled

- swipe:
    direction: DOWN
    duration: 500

# Select "Free Coffee with any pastry purchase" (pc-1, cost 1000)
- tapOn: "Free Coffee with any pastry purchase"

- extendedWaitUntil:
    visible: "Claim reward"
    timeout: 5000

- takeScreenshot: 11-coupon-detail

# Claim the coupon
- tapOn: "Claim reward"

# Wait for redemption success
- extendedWaitUntil:
    visible:
      text: "Won"
    timeout: 10000

- takeScreenshot: 12-coupon-claimed

# Back to rewards
- tapOn: "Back to Rewards"

# ==========================================
# BACK TO BRANDS, THEN TRADE TAB
# ==========================================

- extendedWaitUntil:
    visible: "Panicafe Rewards"
    timeout: 3000

- tapOn:
    text: "Back to Brands"
    optional: true

# Switch to Trade tab
- tapOn: "Trade"

- extendedWaitUntil:
    visible: "SWAP"
    timeout: 5000

- takeScreenshot: 13-trade-swap

# ==========================================
# WALLET / ASSETS TAB
# ==========================================

- tapOn: "Wallet"

- extendedWaitUntil:
    visible: "YOUR"
    timeout: 5000

- takeScreenshot: 14-wallet-nfts

- swipe:
    direction: UP
    duration: 500

- takeScreenshot: 15-wallet-tokens

- swipe:
    direction: DOWN
    duration: 500

# ==========================================
# PROFILE TAB
# ==========================================

- tapOn: "Profile"

- extendedWaitUntil:
    visible: "WALLET"
    timeout: 5000

- takeScreenshot: 16-profile

- swipe:
    direction: UP
    duration: 500

- takeScreenshot: 17-profile-security

- swipe:
    direction: DOWN
    duration: 500

# ==========================================
# BACK TO HOME - FINAL SHOT
# ==========================================

- tapOn: "Home"

- extendedWaitUntil:
    visible: "Scan"
    timeout: 3000

- takeScreenshot: 18-final-home
