# Bondum Full Demo Recording
#
# Drives the app through all screens for demo recording.
# Assumes app is already on the welcome screen (no clearState needed).
# Run adb screenrecord in parallel to capture the video.
#
# Prerequisites:
# - Android device connected via ADB
# - App on welcome screen
# - Dev server running (npx expo start)

appId: xyz.bondum.mobile
---

# ==========================================
# WELCOME SCREEN
# ==========================================

# Skip launchApp — app is already on the welcome screen (dev client)
- extendedWaitUntil:
    visible: "Continue as Guest"
    timeout: 30000

# Pause to show welcome screen
- swipe:
    direction: DOWN
    duration: 2000

# ==========================================
# LOGIN AS GUEST
# ==========================================

- tapOn: "Continue as Guest"

- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

# Pause to show home dashboard
- swipe:
    direction: DOWN
    duration: 2000

# ==========================================
# EXPLORE HOME SCREEN
# ==========================================

# Scroll down to show streak + daily challenge
- swipe:
    direction: UP
    duration: 800

- swipe:
    direction: DOWN
    duration: 1500

# Scroll more to show featured rewards
- swipe:
    direction: UP
    duration: 800

- swipe:
    direction: DOWN
    duration: 1500

# Scroll back to top
- swipe:
    direction: DOWN
    duration: 800

- swipe:
    direction: DOWN
    duration: 1500

# ==========================================
# SCAN QR CODE
# ==========================================

- tapOn: "Scan"

# Scanner loads then auto-triggers fake PaniCafe scan after 2s
- extendedWaitUntil:
    visible: "Claim"
    timeout: 10000

# Pause to show reward preview
- swipe:
    direction: DOWN
    duration: 1500

# Claim the PaniCafe box reward
- tapOn: "Claim"

# Wait for success confirmation (look for button that only appears after claim)
- extendedWaitUntil:
    visible: "Scan Another"
    timeout: 15000

# Pause to show success
- swipe:
    direction: DOWN
    duration: 2000

# Navigate to rewards via Done button
- tapOn: "Done"

# ==========================================
# REWARDS MARKETPLACE
# ==========================================

- extendedWaitUntil:
    visible: "Affiliated Brands"
    timeout: 5000

# Pause to show brands
- swipe:
    direction: DOWN
    duration: 1500

# Open PaniCafe rewards
- tapOn: "Panicafe Rewards"

- extendedWaitUntil:
    visible: "Reward"
    timeout: 5000

# Pause to show reward list
- swipe:
    direction: DOWN
    duration: 1500

# Scroll through reward list
- swipe:
    direction: UP
    duration: 800

- swipe:
    direction: DOWN
    duration: 1000

- swipe:
    direction: DOWN
    duration: 800

# Scroll back up to show brands
- swipe:
    direction: DOWN
    duration: 800

# Pause on reward list
- swipe:
    direction: DOWN
    duration: 1500

# ==========================================
# TRADE TAB
# ==========================================

- tapOn: "Trade"

- extendedWaitUntil:
    visible: "SWAP"
    timeout: 5000

# Pause to show trade screen
- swipe:
    direction: DOWN
    duration: 2000

# ==========================================
# WALLET / ASSETS TAB
# ==========================================

- tapOn: "Wallet"

- extendedWaitUntil:
    visible: "YOUR"
    timeout: 5000

# Pause to show NFTs
- swipe:
    direction: DOWN
    duration: 1500

# Scroll to show tokens
- swipe:
    direction: UP
    duration: 800

# Pause on tokens
- swipe:
    direction: DOWN
    duration: 1500

# Scroll back up
- swipe:
    direction: DOWN
    duration: 800

# ==========================================
# PROFILE TAB
# ==========================================

- tapOn: "Profile"

- extendedWaitUntil:
    visible: "WALLET"
    timeout: 5000

# Pause to show profile
- swipe:
    direction: DOWN
    duration: 1500

# Scroll to show wallet security
- swipe:
    direction: UP
    duration: 800

- swipe:
    direction: DOWN
    duration: 1500

# Scroll back
- swipe:
    direction: DOWN
    duration: 800

# ==========================================
# BACK TO HOME - FINAL SHOT
# ==========================================

- tapOn: "Home"

- extendedWaitUntil:
    visible: "Scan"
    timeout: 3000

# Final pause on home
- swipe:
    direction: DOWN
    duration: 3000
